name: Release Packages

# Manual trigger only - run from GitHub Actions UI when ready to publish
on:
  workflow_dispatch:
    inputs:
      skip_jira:
        description: 'Skip Jira release creation'
        type: boolean
        default: false

# Prevents multiple release workflows from running simultaneously
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to push tags
      id-token: write       # CRITICAL: Needed for NPM Provenance security signing

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Required to trigger other actions when the bot pushes commits
          fetch-depth: 0
          # Prevent token from persisting in .git/config (security best practice)
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # The bash script will handle the specific registry routing via .npmrc

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install

      - name: Build Packages
        run: pnpm --filter "./packages/**" build

      # ==========================================
      # PUBLISH TO NPM + PUSH TAGS + GITHUB RELEASES
      # ==========================================
      # changesets/action runs publish.sh, parses the "New tag: pkg@version"
      # lines that `changeset publish` emits, pushes those git tags, and creates
      # a GitHub Release per package from the CHANGELOG entry. Auth for both the
      # tag push and the release API comes from GITHUB_TOKEN below.
      - name: Publish to NPM and create GitHub Releases
        uses: changesets/action@v1
        with:
          publish: bash ./scripts/publish.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          SKIP_JIRA: ${{ github.event.inputs.skip_jira }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_BOT_USERNAME: ${{ secrets.JIRA_BOT_USERNAME }}
          JIRA_BOT_PASSWORD: ${{ secrets.JIRA_BOT_PASSWORD }}